name: Deploy to EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up kubectl and eksctl
        uses: aws-actions/eks-kubectl@v2
        with:
          cluster-name: ${{ secrets.EKS_CLUSTER_NAME }}
          region: ${{ secrets.AWS_REGION }}

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ secrets.DOCKER_USERNAME }}/node-devops-app:${GITHUB_SHA}
          docker build -t $IMAGE_TAG ./app
          docker push $IMAGE_TAG
          docker tag $IMAGE_TAG ${{ secrets.DOCKER_USERNAME }}/node-devops-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/node-devops-app:latest

      - name: Update Kubernetes deployment
        run: |
          kubectl set image deployment/node-devops-app node-app=${{ secrets.DOCKER_USERNAME }}/node-devops-app:latest
          kubectl rollout status deployment/node-devops-app

      # ✅ Optional: Wait for LoadBalancer and print URL
      - name: Wait for LoadBalancer
        run: |
          echo "Waiting for LoadBalancer to get external IP..."
          for i in {1..30}; do
            LB=$(kubectl get svc node-devops-service -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
            if [ ! -z "$LB" ]; then
              echo "LoadBalancer ready: http://$LB"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done
