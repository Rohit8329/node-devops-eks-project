name: CI/CD to EKS

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: rohit151/node-devops-app  # Docker Hub username/repo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: Install NPM packages
        run: |
          cd app
          npm install

      # 4️⃣ Login to Docker Hub
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5️⃣ Build & Push Docker image
      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${IMAGE_NAME}:${GITHUB_SHA}
          docker build -t $IMAGE_TAG ./app
          docker push $IMAGE_TAG
          docker tag $IMAGE_TAG ${IMAGE_NAME}:latest
          docker push ${IMAGE_NAME}:latest
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      # 6️⃣ Configure AWS CLI
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 7️⃣ Deploy to EKS
      - name: Deploy to EKS
        uses: aws-actions/eks-kubectl@v2
        with:
          cluster-name: ${{ secrets.EKS_CLUSTER_NAME }}
          region: ${{ secrets.AWS_REGION }}
          manifests: ./kubernetes
          args: set image deployment/node-devops-app node-app=${{ env.IMAGE_NAME }}:${GITHUB_SHA}
